name: update-metals

# Met à jour data/metals_daily.json chaque jour (clôtures or + argent, source Stooq).
# Le compagnon tactique lit ce fichier en même origine : toujours frais, sans clé, sans CORS.

on:
  schedule:
    - cron: '30 6 * * *'        # tous les jours à 06:30 UTC
  workflow_dispatch:             # + déclenchement manuel (onglet Actions → Run workflow)

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Récupérer or & argent (Stooq, clôtures quotidiennes)
        run: |
          python3 - << 'PY'
          import urllib.request, json, os, datetime

          def fetch(sym):
              url = f"https://stooq.com/q/d/l/?s={sym}&i=d"
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              txt = urllib.request.urlopen(req, timeout=40).read().decode()
              out = []
              for line in txt.strip().splitlines()[1:]:      # saute l'en-tête
                  c = line.split(",")
                  if len(c) >= 5:
                      try:
                          out.append({"d": c[0], "c": float(c[4])})  # Date, Close
                      except ValueError:
                          pass
              return out[-600:]                               # ~2,5 ans de séances

          gold   = fetch("xauusd")
          silver = fetch("xagusd")
          eurusd = fetch("eurusd")
          if len(gold) < 50:
              raise SystemExit("Échec récupération or (Stooq) — source à vérifier")

          data = {"updated": datetime.date.today().isoformat(),
                  "gold": gold, "silver": silver, "eurusd": eurusd}
          os.makedirs("data", exist_ok=True)
          with open("data/metals_daily.json", "w") as f:
              json.dump(data, f)
          print(f"or={len(gold)} pts (dernier {gold[-1]['d']}), argent={len(silver)} pts, eurusd={len(eurusd)} pts")
          PY

      - name: Publier
        run: |
          git config user.name  "metals-bot"
          git config user.email "metals-bot@users.noreply.github.com"
          git add data/metals_daily.json
          git commit -m "maj métaux $(date -u +%F)" || echo "aucun changement"
          git push
